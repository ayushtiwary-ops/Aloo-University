<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdmitGuard — ALOO University 🥔</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥔</text></svg>">

    <!-- Fonts: Playfair Display (serif headings) + Inter (sans body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Design system — tokens must load before component styles -->
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/header.css" />
    <link rel="stylesheet" href="/src/styles/card.css" />
    <link rel="stylesheet" href="/src/styles/input.css" />
    <link rel="stylesheet" href="/src/styles/button.css" />
    <link rel="stylesheet" href="/src/styles/audit.css" />
    <link rel="stylesheet" href="/src/styles/modal.css" />
    <link rel="stylesheet" href="/src/styles/dashboard.css" />
    <link rel="stylesheet" href="/src/styles/splash.css" />
    <link rel="stylesheet" href="/src/styles/badge.css" />
    <link rel="stylesheet" href="/src/styles/auth.css" />
    <link rel="stylesheet" href="/src/styles/candidate.css" />

    <!-- Apply saved theme before first paint to prevent flash of wrong theme -->
    <script>
      (function () {
        var saved = localStorage.getItem('aloo_admitguard_theme');
        var osPref = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark' : 'light';
        document.documentElement.dataset.theme = (saved === 'light' || saved === 'dark')
          ? saved : osPref;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
